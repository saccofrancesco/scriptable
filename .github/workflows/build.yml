name: Build desktop app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: workshift-linux
            output_name: Workshift
            pyinstaller_args: --onefile --windowed
          - os: windows-latest
            artifact_name: workshift-windows
            output_name: Workshift.exe
            pyinstaller_args: --onefile --windowed
          - os: macos-latest
            artifact_name: workshift-macos
            output_name: Workshift.app
            pyinstaller_args: --onedir --windowed

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        shell: bash
        run: |
          pyinstaller \
            --noconfirm \
            --clean \
            --name Workshift \
            ${{ matrix.pyinstaller_args }} \
            main.py

      - name: Package output
        shell: bash
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            mkdir -p package
            cp "dist/${{ matrix.output_name }}" "package/${{ matrix.output_name }}"
          elif [ "${{ runner.os }}" = "macOS" ]; then
            mkdir -p package
            ditto "dist/${{ matrix.output_name }}" "package/${{ matrix.output_name }}"
          else
            mkdir -p package
            cp "dist/${{ matrix.output_name }}" "package/${{ matrix.output_name }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: package/*
          if-no-files-found: error
          retention-days: 30
